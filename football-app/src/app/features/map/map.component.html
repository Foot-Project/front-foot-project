<div class="map-wrapper">
  <div class="map-header">
    <div class="map-header__logo">
      <i class="pi pi-globe"></i>
      <span>FootMap</span>
    </div>
    <div class="map-header__subtitle">Carte des stades</div>
  </div>

  <div id="map"></div>

  <app-stade-drawer
    [stadeId]="selectedStadeId ?? 0"
    [visible]="drawerVisible"
    (closeDrawer)="onDrawerClose()"
  />
</div>
