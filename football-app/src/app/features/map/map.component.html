<div class="map-wrapper">
  <!-- Header overlay -->
  <div class="map-header">
    <div class="map-header__logo">
      <i class="pi pi-globe"></i>
      <span>FootMap</span>
    </div>
    <div class="map-header__subtitle">Carte des stades</div>
  </div>

  <!-- Carte Leaflet -->
  <div id="map"></div>

  <!-- Drawer stade -->
 <app-stade-drawer
    [stadeId]="selectedStadeId ?? 0"
    [visible]="drawerVisible"
    (visibleChange)="onDrawerClose()"
 />
  
</div>
